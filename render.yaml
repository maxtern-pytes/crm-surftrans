{
  "$schema": "https://render.com/schema.json",
  "services": [
    {
      "type": "web",
      "name": "surftrans-backend",
      "env": "node",
      "rootDir": "backend",
      "buildCommand": "npm install",
      "startCommand": "node server.js",
      "autoDeploy": true,
      "envVars": [
        { "key": "NODE_ENV", "value": "production" },
        { "key": "PORT", "value": "3001" },
        { "key": "DB_TYPE", "value": "sqlite" },
        { "key": "TOGETHER_API_KEY", "sync": false },
        { "key": "AI_MODEL", "value": "meta-llama/Llama-3.2-1B-Instruct-Turbo" },
        { "key": "JWT_SECRET", "sync": false },
        { "key": "ENABLE_EMAIL_SENDING", "value": "false" },
        { "key": "ENABLE_WEB_SCRAPING", "value": "true" },
        { "key": "ENABLE_AI_TASK_ASSIGNMENT", "value": "true" },
        { "key": "ENABLE_MARKET_TRENDS", "value": "true" },
        { "key": "CORS_ORIGINS", "value": "https://surftrans-frontend.onrender.com,http://localhost:5173" }
      ]
    },
    {
      "type": "web",
      "name": "surftrans-frontend",
      "env": "static",
      "rootDir": "frontend",
      "buildCommand": "npm install && npm run build",
      "staticPublishPath": "./dist",
      "autoDeploy": true,
      "envVars": [
        { "key": "VITE_API_URL", "value": "https://surftrans-backend.onrender.com/api" }
      ]
    }
  ]
}
